experiment:
  scenario: "intersection_basic"
  seed: 42
  duration: 1800
  controller: "vision_adaptive"

sumo:
  config_path: "../sumo/configs/RL.sumocfg"
  gui: true
  step_length: 0.1

unity:
  state_host: "127.0.0.1"
  state_port: 5004
  frame_host: "127.0.0.1"
  frame_port: 5005
  frame_timeout: 2.0
  frame_transport: "tcp"

cameras:
  north:
    enabled: true
    roi:
      - [100, 250]
      - [540, 250]
      - [540, 620]
      - [100, 620]
  south:
    enabled: true
    roi:
      - [100, 250]
      - [540, 250]
      - [540, 620]
      - [100, 620]
  east:
    enabled: true
    roi:
      - [100, 250]
      - [540, 250]
      - [540, 620]
      - [100, 620]
  west:
    enabled: true
    roi:
      - [100, 250]
      - [540, 250]
      - [540, 620]
      - [100, 620]

vision:
  model_path: "yolov8n.pt"
  confidence_threshold: 0.35
  inference_size: 640
  classes: [2, 3, 5, 7]
  use_tracker: true
  smoothing_window: 5
  update_every_steps: 5

traffic_light:
  id: "Node2"
  phases:
    ns_green: 0
    ns_yellow: 1
    all_red_after_ns: null
    ew_green: 2
    ew_yellow: 3
    all_red_after_ew: null
  has_all_red: false

traffic_controller:
  min_green: 10.0
  max_green: 45.0
  yellow_duration: 3.0
  all_red_duration: 1.0
  low_demand_threshold: 0
  switch_margin: 2

logging:
  output_dir: "../results/logs"
  debug_frame_dir: "../results/frames"
  save_debug_frames: true
  save_every_n_vision_steps: 10
